name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sS --fail --retry 5 --retry-delay 10 --retry-all-errors \
               --max-time 60 \
               -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
               https://api.aakashvijeta.me/predict/2026/1
